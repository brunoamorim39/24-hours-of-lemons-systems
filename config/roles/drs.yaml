# DRS App Configuration
# Role-specific settings (hardware-agnostic)

servo:
  channel: 0                    # PCA9685 channel
  open_angle: 90                # Angle when DRS is active (degrees)
  closed_angle: 0               # Angle when DRS is closed (degrees)
  transition_time: 0.5          # Time to move between positions (seconds)

debounce:
  button_ms: 50                 # Button debounce time (milliseconds)
  brake_ms: 20                  # Brake switch debounce time (milliseconds)

api:
  port: 5001                    # API server port
  bind: "0.0.0.0"               # Bind address (0.0.0.0 = all interfaces)

logging:
  level: "INFO"                 # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/drs.log"          # Log file path (optional)

watchdog:
  timeout_s: 10.0               # Watchdog timeout (seconds)
