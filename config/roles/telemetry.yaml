# Telemetry App Configuration
# Role-specific settings (hardware-agnostic)

obd:
  port: "/dev/ttyUSB0"          # OBD adapter serial port
  baudrate: 38400               # OBD communication baud rate
  update_rate_hz: 10.0          # Data collection rate (Hz)
  pids:                         # OBD PIDs to query
    - "SPEED"
    - "RPM"
    - "COOLANT_TEMP"
    - "THROTTLE_POS"
    - "ENGINE_LOAD"

custom_metrics:
  update_rate_hz: 2.0           # Custom metrics collection rate (Hz)
  endpoints:                    # API endpoints to query
    drs: "http://localhost:5001/status"
    # radio: "http://localhost:5002/status"  # Future

dashboard:
  port: 5000                    # Dashboard server port
  bind: "0.0.0.0"               # Bind address (0.0.0.0 = all interfaces)

logging:
  level: "INFO"                 # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/telemetry.log"    # Log file path (optional)

watchdog:
  timeout_s: 10.0               # Watchdog timeout (seconds)
