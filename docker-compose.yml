# Docker Compose for 24 Hours of Lemons development
version: '3.8'

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lemons-dev
    volumes:
      # Mount code directory for live editing
      - .:/workspace
      # Persist pip cache
      - pip-cache:/root/.cache/pip
    ports:
      # Telemetry dashboard
      - "5000:5000"
      # DRS API
      - "5001:5001"
    environment:
      # Force Python to output everything immediately (useful for logs)
      - PYTHONUNBUFFERED=1
    # Keep container running
    stdin_open: true
    tty: true
    # Default command: bash
    command: /bin/bash

volumes:
  pip-cache:
