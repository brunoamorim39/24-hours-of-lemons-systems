<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24 Hours of Lemons - Telemetry Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #0f0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            padding: 15px;
            border: 2px solid #0f0;
            background: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header .subtitle {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: #1a1a1a;
            border: 2px solid #0f0;
            padding: 20px;
            border-radius: 5px;
        }

        .metric-label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 48px;
            font-weight: bold;
            color: #0f0;
        }

        .metric-unit {
            font-size: 18px;
            color: #888;
            margin-left: 5px;
        }

        .drs-card {
            background: #1a1a1a;
            border: 2px solid #888;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .drs-card.active {
            border-color: #ff0;
            background: #2a2a00;
            box-shadow: 0 0 20px #ff0;
        }

        .drs-status {
            font-size: 36px;
            font-weight: bold;
            color: #888;
        }

        .drs-card.active .drs-status {
            color: #ff0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .connection-status.connected {
            background: #004400;
            color: #0f0;
            border: 1px solid #0f0;
        }

        .connection-status.disconnected {
            background: #440000;
            color: #f00;
            border: 1px solid #f00;
        }

        .chart-container {
            background: #1a1a1a;
            border: 2px solid #0f0;
            padding: 20px;
            margin-top: 20px;
        }

        .chart-title {
            font-size: 18px;
            color: #0f0;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        canvas {
            max-height: 300px;
        }

        .warning {
            color: #f80;
        }

        .danger {
            color: #f00;
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">Connecting...</div>

    <div class="header">
        🏁 24 Hours of Lemons - Live Telemetry
        <div class="subtitle">Real-time vehicle data</div>
    </div>

    <div class="dashboard">
        <div class="metric-card">
            <div class="metric-label">Speed</div>
            <div>
                <span class="metric-value" id="speed">--</span>
                <span class="metric-unit">km/h</span>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-label">Engine RPM</div>
            <div>
                <span class="metric-value" id="rpm">--</span>
                <span class="metric-unit">rpm</span>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-label">Coolant Temp</div>
            <div>
                <span class="metric-value" id="coolant">--</span>
                <span class="metric-unit">°C</span>
            </div>
        </div>

        <div class="drs-card" id="drsCard">
            <div class="metric-label">DRS Status</div>
            <div class="drs-status" id="drsStatus">--</div>
        </div>

        <div class="metric-card">
            <div class="metric-label">Throttle</div>
            <div>
                <span class="metric-value" id="throttle">--</span>
                <span class="metric-unit">%</span>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-label">Engine Load</div>
            <div>
                <span class="metric-value" id="engineLoad">--</span>
                <span class="metric-unit">%</span>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-title">Speed & RPM History</div>
        <canvas id="historyChart"></canvas>
    </div>

    <script src="app.js"></script>
</body>
</html>
